<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ararat Coffee - Checkout</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <div class="checkout-container">
        <h2>📋 Complete Your Order</h2>
        <p class="checkout-subtitle">Please fill in your details to process your order.</p>

        <!-- فورم إدخال البيانات الشخصية -->
        <form id="checkout-form" action="submit_order.php" method="POST" onsubmit="prepareCartData(event)">
            
            <!-- حقل مخفي سنضع داخله بيانات السلة عبر الجافاسكريبت قبل الإرسال -->
            <input type="hidden" name="cart_data" id="hidden-cart-data">

            <div class="form-group-row">
                <div class="form-group">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname" required placeholder="John">
                </div>
                
                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname" required placeholder="Doe">
                </div>
            </div>

            <div class="form-group">
                <label for="address">Delivery Address / Table Number</label>
                <input type="text" id="address" name="address" required placeholder="e.g., Table 5 or Street Name">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="0555 12 34 56">
            </div>

            <!-- صندوق ملخص الحساب السريع -->
            <div class="checkout-summary">
                <span>Total to Pay:</span>
                <span id="checkout-total">0 DA</span>
            </div>

            <div class="form-buttons">
                <a href="cart.html" class="btn-back">‹ Return to Cart</a>
                <button type="submit" class="btn-submit">Confirm Order (Pending) ☕</button>
            </div>
        </form>
    </div>

    <script>
        // بمجرد تحميل الصفحة، نعرض المجموع النهائي للزبون ليتأكد منه
        document.addEventListener('DOMContentLoaded', () => {
            const cart = JSON.parse(localStorage.getItem('ararat_cart')) || [];
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.quantity;
            });
            document.getElementById('checkout-total').innerText = total + ' DA';
        });

        // هذه الدالة السحرية تأخذ بيانات السلة وتضعها داخل الحقل المخفي قبل إرسال الفورم للـ PHP
        function prepareCartData(event) {
            const cart = JSON.parse(localStorage.getItem('ararat_cart')) || [];
            
            if (cart.length === 0) {
                alert("Your cart is empty! Cannot submit order.");
                event.preventDefault(); // إيقاف الإرسال
                return false;
            }

            // تحويل مصفوفة السلة إلى نص JSON وضعه في الحقل المخفي
            document.getElementById('hidden-cart-data').value = JSON.stringify(cart);
        }
    </script>
</body>
</html>
